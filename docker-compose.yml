services:
  postgres:
    image: postgres:17-alpine
    container_name: autofabrication-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofabrication
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
